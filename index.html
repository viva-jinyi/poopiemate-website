<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>응가메이트 | PoopieMate</title>
  <meta name="description" content="비가오나 눈이오나 실외배변 루틴을 지켜요">
  <meta name="theme-color" content="#6ab4d6">
  <meta property="og:title" content="응가메이트 💩✨">
  <meta property="og:description" content="비가오나 눈이오나 실외배변 루틴을 지켜요">
  <meta property="og:type" content="website">
  <meta property="og:image" content="https://viva-jinyi.github.io/poopiemate-website/assets/og-image.png">
  <link rel="icon" type="image/png" sizes="512x512" href="assets/favicon.png">
  <link rel="apple-touch-icon" href="assets/favicon.png">

  <!-- 낮/밤 배경 즉시 적용 (FOUC 방지) -->
  <script>
    (function() {
      var h = new Date().getHours();
      document.documentElement.setAttribute('data-sky', (h >= 8 && h < 19) ? 'day' : 'night');
    })();
  </script>

  <style>
    @font-face {
      font-family: "NanumSquareNeo";
      src: url("assets/fonts/NanumSquareNeo-bRg.ttf") format("truetype");
      font-weight: 400 600; font-style: normal; font-display: swap;
    }
    @font-face {
      font-family: "NanumSquareNeo";
      src: url("assets/fonts/NanumSquareNeo-cBd.ttf") format("truetype");
      font-weight: 700 900; font-style: normal; font-display: swap;
    }

    :root {
      --bg: #ebf7f2;
      --ink: #1d1f1f;
      --muted: #84938a;
      --green: #18955a;
      --green-dark: #0e7041;
      --pink: #e88add;
      --pink-dark: #c865bc;
      --line: #d8ebe3;
    }

    /* ── 스크롤바 숨김 ── */
    ::-webkit-scrollbar { display: none; }
    html { scrollbar-width: none; }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }

    html[data-sky="day"]  body { background-image: url('assets/bg_day.png'); }
    html[data-sky="night"] body { background-image: url('assets/bg_night.png'); }

    body {
      overflow-x: hidden;
      background-color: #b8e8d2;
      background-size: cover;
      background-position: center top;
      background-attachment: fixed;
      color: var(--ink);
      font-family: "NanumSquareNeo", -apple-system, "Apple SD Gothic Neo", "Noto Sans KR", sans-serif;
    }
    a { color: inherit; }
    img { display: block; max-width: 100%; }
    button { font: inherit; cursor: pointer; border: none; background: none; padding: 0; }

    /* ── NAV — 투명 기본, 스크롤시 glass ── */
    .site-header {
      position: sticky; top: 0; z-index: 100;
      transition: background 0.3s, border-color 0.3s, backdrop-filter 0.3s;
      border-bottom: 1px solid transparent;
    }
    .site-header.scrolled {
      background: rgba(255,255,255,0.9);
      backdrop-filter: blur(20px);
      border-bottom-color: rgba(216,235,227,0.6);
    }
    .nav {
      display: flex; align-items: center; justify-content: space-between;
      max-width: 1200px; margin: 0 auto; padding: 14px 32px;
    }
    .brand { display: inline-flex; align-items: center; gap: 10px; text-decoration: none; }
    /* 인라인 SVG 로고 — 투명bg + 흰선 기본, 스크롤시 그린 */
    .brand-icon-svg {
      width: 36px; height: 36px; flex: 0 0 36px;
      fill: white; stroke: white;
      transition: fill 0.3s, stroke 0.3s;
    }
    .site-header.scrolled .brand-icon-svg { fill: var(--green); stroke: var(--green); }
    /* 투명 헤더 = 흰 워드마크. scrolled = 검정 */
    .brand-wordmark { height: 46px; width: auto; filter: brightness(10); transition: filter 0.3s; }
    .site-header.scrolled .brand-wordmark { filter: brightness(0); }

    .nav-links {
      display: flex; align-items: center; gap: 20px;
      font-size: 14px; font-weight: 800;
    }
    .nav-links a { color: rgba(255,255,255,0.9); text-decoration: none; transition: color 0.2s, opacity 0.2s; }
    .nav-links a:hover { opacity: 0.7; }
    .site-header.scrolled .nav-links a { color: var(--muted); }
    .site-header.scrolled .nav-links a:hover { color: var(--green); opacity: 1; }

    /* ── HERO SPLIT ── */
    .page-wrap { max-width: 1200px; margin: 0 auto; padding: 0 48px; }
    .hero-split {
      display: grid;
      grid-template-columns: 1fr 380px;
      gap: 60px;
      align-items: center;
      height: calc(100vh - 74px);
      padding: 24px 0;
    }

    /* ── HERO LEFT ── */
    h1 {
      font-size: clamp(26px, 3vw, 44px);
      line-height: 1.26;
      font-weight: 900;
      letter-spacing: -0.02em;
      word-break: keep-all;
      color: #fff;
      text-shadow: 0 1px 4px rgba(0,0,0,0.18);
    }
    h1 .h1-pink { color: var(--pink); }

    /* ── SWIPE SECTION ── */
    .app-preview { margin: 28px 0 0; display: flex; flex-direction: column; gap: 10px; max-width: 336px; }

    /* ── SWIPE TO COMPLETE (실제 앱 로직 포팅) ── */
    .swipe-container {
      position: relative;
      height: 68px;
      border-radius: 18px;
      background: var(--green);
      overflow: hidden;
      cursor: default;
      user-select: none;
      -webkit-user-select: none;
      box-shadow: 0 8px 24px rgba(0,0,0,0.12);
    }
    .swipe-label, .swipe-done {
      position: absolute; inset: 0;
      display: flex; align-items: center; justify-content: center; gap: 6px;
      font-size: 16px; font-weight: 900; color: white;
      pointer-events: none;
      transition: none;
    }
    .swipe-label { opacity: 0.55; padding-left: 40px; }
    .swipe-done  { opacity: 0; }
    .swipe-heart {
      width: 16px; height: 16px; flex: 0 0 16px;
      fill: #EA98E0; stroke: #EA98E0; stroke-width: 2;
      stroke-linecap: round; stroke-linejoin: round;
    }

    .swipe-thumb {
      position: absolute;
      left: 6px; top: 8px;
      width: 52px; height: 52px;
      border-radius: 50%;
      background: #fff;
      display: flex; align-items: center; justify-content: center;
      cursor: grab;
    }
    .swipe-thumb:active { cursor: grabbing; }

    /* Dog walking icon */
    .dog-wrap { position: relative; width: 36px; height: 36px; }
    .dog-static, .dog-rear, .dog-front {
      position: absolute; top: 0; left: 0; width: 100%; height: 100%;
    }
    .dog-rear  { transform-origin: 10.3% 64%; }
    .dog-front { transform-origin: 75%  54%; }


    /* ── PHONE DEMO ── */
    .hero-right {
      display: flex; flex-direction: column; align-items: center;
    }
    .phone-shell {
      position: relative;
      width: 380px;
      background: linear-gradient(160deg, #2c2c2e 0%, #1a1a1c 55%, #252527 100%);
      border-radius: 52px;
      padding: 7px;
      box-shadow:
        0 0 0 1px #3a3a3c,
        0 0 0 2px #1a1a1c,
        0 60px 120px rgba(0,0,0,0.52),
        0 24px 48px rgba(0,0,0,0.28),
        inset 0 1px 0 rgba(255,255,255,0.12),
        inset 0 -1px 0 rgba(0,0,0,0.4);
    }
    .phone-shell::before {
      content: ''; position: absolute; left: -4px; top: 112px;
      width: 4px; height: 34px; background: #2c2c2e;
      border-radius: 3px 0 0 3px; box-shadow: 0 48px 0 #2c2c2e;
    }
    .phone-shell::after {
      content: ''; position: absolute; right: -4px; top: 148px;
      width: 4px; height: 68px; background: #2c2c2e;
      border-radius: 0 3px 3px 0;
    }
    .phone-screen {
      position: relative; border-radius: 46px; overflow: hidden;
      background: #000; aspect-ratio: 393 / 852;
    }
    /* 이미지 드래그/저장 방지 */
    .screen-img {
      position: absolute; top: 0; left: 0; width: 100%; height: 100%;
      object-fit: cover; display: none;
      -webkit-user-drag: none; user-select: none; pointer-events: none;
    }
    .screen-img.active { display: block; }
    .phone-screen::after {
      content: ''; position: absolute; inset: 0; z-index: 1;
    }
    .tab-overlay {
      position: absolute; bottom: 0; left: 0; right: 0;
      height: 13%; display: flex; z-index: 10;
    }
    .tab-zone {
      flex: 1; background: transparent; cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }

    /* ── SUPPORT SECTION ── */
    .support-section { background: var(--bg); border-top: 1px solid var(--line); position: relative; }
    .support-inner {
      max-width: 1200px; margin: 0 auto; padding: 72px 32px;
      display: grid; grid-template-columns: 1fr auto; gap: 48px; align-items: start;
    }
    .support-title { font-size: clamp(26px, 3.5vw, 42px); font-weight: 900; margin: 0 0 10px; line-height: 1.22; }
    .support-sub { color: var(--muted); font-size: 16px; font-weight: 700; line-height: 1.7; max-width: 480px; word-break: keep-all; }
    .support-panel {
      min-width: 250px; padding: 22px; background: #fff;
      border-radius: 20px; border: 1px solid var(--line);
      box-shadow: 0 12px 32px rgba(24,149,90,0.08);
    }
    .panel-title { font-size: 17px; font-weight: 900; margin: 0 0 12px; }
    .panel-info { font-size: 13px; font-weight: 700; color: var(--muted); line-height: 1.7; margin: 0 0 6px; }
    .panel-info a { color: var(--green); text-decoration: none; font-weight: 900; }
    .panel-links { margin-top: 14px; border-top: 1px solid var(--line); }
    .panel-link {
      display: flex; justify-content: space-between; align-items: center;
      padding: 11px 0; border-bottom: 1px solid var(--line);
      text-decoration: none; color: var(--ink);
      font-size: 13px; font-weight: 900; transition: color 0.2s;
    }
    .panel-link:hover { color: var(--green); }
    .panel-link span { color: var(--muted); }

    /* ── FOOTER ── */
    footer {
      background: #0e6f3f;
      color: rgba(255,255,255,0.6); position: relative;
    }
    .footer-inner {
      display: flex; justify-content: space-between; align-items: center;
      max-width: 1200px; margin: 0 auto; padding: 22px 48px;
      font-size: 13px; font-weight: 700;
    }
    .footer-inner a { color: rgba(255,255,255,0.75); text-decoration: none; transition: color 0.2s; }
    .footer-inner a:hover { color: var(--green); }

    /* ── RESPONSIVE ── */
    @media (max-width: 960px) {
      body { background-attachment: scroll; }
      .hero-split { grid-template-columns: 1fr; height: auto; min-height: calc(100vh - 64px); padding: 40px 0 48px; gap: 40px; }
      .hero-right { order: -1; position: static; }
      .phone-shell { width: 320px; }
      .support-inner { grid-template-columns: 1fr; padding: 52px 24px; }
    }
    @media (max-width: 600px) {
      .nav { padding: 12px 24px; }
      .brand-wordmark { height: 36px; }
      .nav-links { gap: 14px; font-size: 13px; }
      .page-wrap { padding: 0 24px; }
      .phone-shell { width: 280px; }
      .support-inner { padding: 44px 20px; }
      .footer-inner { flex-direction: column; align-items: flex-start; gap: 8px; padding: 20px; }
    }
  </style>
</head>

<script>
// ── 헤더 스크롤 처리 ──
const header = document.getElementById('siteHeader');
window.addEventListener('scroll', () => {
  header.classList.toggle('scrolled', window.scrollY > 40);
}, { passive: true });

// ── 탭 전환 (투명 overlay 클릭) ──
const imgs  = document.querySelectorAll('.screen-img');
const zones = document.querySelectorAll('.tab-zone');
zones.forEach(z => z.addEventListener('click', () => {
  imgs.forEach(i => i.classList.toggle('active', i.dataset.screen === z.dataset.tab));
}));

// 이미지 컨텍스트 메뉴 방지
document.querySelector('.phone-screen').addEventListener('contextmenu', e => e.preventDefault());

// ── SwipeToComplete — 앱 로직 포팅 ──
(function() {
  const THUMB_SIZE = 52;
  const TRACK_PAD  = 6;
  const THRESHOLD  = 0.82;

  const container = document.getElementById('swipeContainer');
  const thumb     = document.getElementById('swipeThumb');
  const label     = document.getElementById('swipeLabel');
  const done      = document.getElementById('swipeDone');
  const rearSvg   = document.getElementById('dogRear');
  const frontSvg  = document.getElementById('dogFront');

  let isDragging = false;
  let startX     = 0;
  let curX       = 0;

  function getMax() {
    return Math.max(1, container.offsetWidth - THUMB_SIZE - TRACK_PAD * 2);
  }

  function updateAt(x) {
    const max = getMax();
    curX = Math.max(0, Math.min(x, max));

    // thumb position (no CSS transition while dragging)
    thumb.style.transform = `translateX(${curX}px)`;

    // dog leg swing — same formula as app: Math.sin(progress / 5)
    const phase = curX / 5;
    rearSvg.style.transform  = `rotate(${Math.sin(phase)  *  12}deg)`;
    frontSvg.style.transform = `rotate(${-Math.sin(phase) *   7}deg)`;

    // label fades
    const p = curX / max;
    // label: [0→0.55, max*0.4→0]
    label.style.opacity = String(p <= 0.4 ? 0.55 * (1 - p / 0.4) : 0);
    // done: [0→0 until 55%, then 0→1]
    done.style.opacity  = String(p >= 0.55 ? (p - 0.55) / 0.45 : 0);
  }

  function snapTo(target, duration, cb) {
    thumb.style.transition  = `transform ${duration}ms ease-${target > 0 ? 'out' : 'in-out'}`;
    rearSvg.style.transition  = `transform ${duration}ms`;
    frontSvg.style.transition = `transform ${duration}ms`;
    updateAt(target);
    setTimeout(() => {
      thumb.style.transition = rearSvg.style.transition = frontSvg.style.transition = '';
      if (cb) cb();
    }, duration);
  }

  function onEnd() {
    if (!isDragging) return;
    isDragging = false;
    const max = getMax();
    if (curX >= max * THRESHOLD) {
      // complete → Mac/iOS → App Store, others → Play Store
      snapTo(max, 120, () => {
        var ua = navigator.userAgent || '';
        var isMac = /Macintosh|Mac OS X|iPhone|iPad|iPod/.test(ua);
        window.location.href = isMac
          ? 'https://apps.apple.com/kr/app/%EC%9D%91%EA%B0%80%EB%A9%94%EC%9D%B4%ED%8A%B8/id6781981502'
          : 'https://play.google.com/store/apps/details?id=com.pixelberry.poopiemate&hl=ko';
      });
    } else {
      snapTo(0, 180);
    }
  }

  // ── Touch ──
  thumb.addEventListener('touchstart', e => {
    isDragging = true;
    startX = e.touches[0].clientX - curX;
    e.preventDefault();
  }, { passive: false });

  container.addEventListener('touchmove', e => {
    if (!isDragging) return;
    e.preventDefault();
    updateAt(e.touches[0].clientX - startX);
  }, { passive: false });

  container.addEventListener('touchend',   onEnd);
  container.addEventListener('touchcancel', onEnd);

  // ── Mouse ──
  thumb.addEventListener('mousedown', e => {
    isDragging = true;
    startX = e.clientX - curX;
    e.preventDefault();
  });

  document.addEventListener('mousemove', e => {
    if (!isDragging) return;
    updateAt(e.clientX - startX);
  });

  document.addEventListener('mouseup', onEnd);
})();
</script>
