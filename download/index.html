<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>응가메이트 다운로드</title>
  <link rel="icon" type="image/png" href="../assets/favicon.png">
  <script>
    (function () {
      var ua = navigator.userAgent || navigator.vendor || window.opera;
      if (/iPad|iPhone|iPod/.test(ua) && !window.MSStream) {
        window.location.replace('https://apps.apple.com/kr/app/%EC%9D%91%EA%B0%80%EB%A9%94%EC%9D%B4%ED%8A%B8/id6781981502');
      }
    })();
  </script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --green: #18955a;
      --bg: #ebf7f2;
      --ink: #1d1f1f;
      --muted: #84938a;
      --line: #d8ebe3;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", "Noto Sans KR", sans-serif;
      background: var(--bg);
      color: var(--ink);
      min-height: 100svh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 32px 20px;
    }
    .card {
      background: #fff;
      border-radius: 28px;
      box-shadow: 0 24px 64px rgba(20, 121, 75, 0.14);
      padding: 48px 36px;
      max-width: 400px;
      width: 100%;
      text-align: center;
    }
    .icon {
      width: 88px;
      height: 88px;
      border-radius: 22px;
      margin: 0 auto 22px;
      display: block;
    }
    h1 {
      font-size: 26px;
      font-weight: 900;
      color: var(--green);
      margin-bottom: 8px;
    }
    p {
      font-size: 15px;
      color: var(--muted);
      line-height: 1.6;
      margin-bottom: 32px;
    }
    .appstore-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      background: #000;
      color: #fff;
      text-decoration: none;
      border-radius: 16px;
      padding: 15px 24px;
      font-size: 15px;
      font-weight: 700;
      transition: background 0.15s;
    }
    .appstore-btn:hover { background: #222; }
    .appstore-label { text-align: left; line-height: 1.25; }
    .appstore-label span { display: block; font-size: 11px; font-weight: 400; opacity: 0.75; }
    .back {
      margin-top: 22px;
      font-size: 13px;
      color: var(--muted);
    }
    .back a { color: var(--green); text-decoration: none; font-weight: 700; }
  </style>
</head>
<body>
  <div class="card">
    <img src="../assets/favicon.png" alt="응가메이트" class="icon">
    <h1>응가메이트</h1>
    <p>반려동물 배변·산책·케어 기록을<br>가족과 함께 관리하세요.</p>
    <a class="appstore-btn" href="https://apps.apple.com/kr/app/%EC%9D%91%EA%B0%80%EB%A9%94%EC%9D%B4%ED%8A%B8/id6781981502">
      <svg width="22" height="22" viewBox="0 0 814 1000" fill="white" xmlns="http://www.w3.org/2000/svg">
        <path d="M788.1 340.9c-5.8 4.5-108.2 62.2-108.2 190.5 0 148.4 130.3 200.9 134.2 202.2-.6 3.2-20.7 71.9-68.7 141.9-42.8 61.6-87.5 123.1-155.5 123.1s-85.5-39.5-164-39.5c-76 0-103.7 40.8-165.9 40.8s-105-57.8-155.5-127.4C46 790.7 0 663 0 541.8c0-207.5 135.4-317.3 268.9-317.3 70.2 0 128.6 46.2 172.5 46.2 43.9 0 112.1-49 192.4-49 31 0 108.2 2.6 168.1 74.9zm-119.3-190.5c-14.1 63.9-52.6 118.1-90 151.4-29.2 26.6-82.4 47.2-127.4 47.2-4.6 0-9.2-.6-13.8-.6-.6-4.5-.9-9.1-.9-13.7 0-57.8 28.3-118.1 75.8-159 22.5-19.4 65-36 102.2-39.5 2.2 0 4.5-.3 6.7-.3 15.3 0 30.9.6 47.4 13.5z"/>
      </svg>
      <div class="appstore-label">
        <span>App Store에서</span>
        다운로드
      </div>
    </a>
    <div class="back"><a href="../">← 홈으로</a></div>
  </div>
</body>
</html>
